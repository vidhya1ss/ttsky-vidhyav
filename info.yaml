# Tiny Tapeout project information
project:
  title:        "SMAC Unit"
  author:       "V. Vidhya"
  discord:      ""
  description:  "8-bit Serial Multiply-Accumulate (SMAC) unit for DSP and neural network applications"
  language:     "Verilog"
  clock_hz:     10000000

  tiles: "1x1"

  top_module:  "tt_um_example"

  source_files:
    - "project.v"

pinout:
  # Inputs.
  ui[0]: "Operand A bit 0"
  ui[1]: "Operand A bit 1"
  ui[2]: "Operand A bit 2"
  ui[3]: "Operand A bit 3"
  ui[4]: "Operand B bit 0"
  ui[5]: "Operand B bit 1"
  ui[6]: "Operand B bit 2"
  ui[7]: "Operand B bit 3"

  # Outputs
  uo[0]: "Accumulator bit 0"
  uo[1]: "Accumulator bit 1"
  uo[2]: "Accumulator bit 2"
  uo[3]: "Accumulator bit 3"
  uo[4]: "Accumulator bit 4"
  uo[5]: "Accumulator bit 5"
  uo[6]: "Accumulator bit 6"
  uo[7]: "Accumulator bit 7"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
