# Tiny Tapeout project information

project:
title: "SMAC Unit"
author: "V. Vidhya"
discord: ""
description: "8-bit Multiply-Accumulate (MAC) unit that accumulates the product of two 8-bit inputs."
language: "Verilog"
clock_hz: 10000000

tiles: "1x1"

top_module: "tt_um_example"

source_files:
- "project.v"

pinout:

# Input A (ui_in[7:0])

ui[0]: "A[0]"
ui[1]: "A[1]"
ui[2]: "A[2]"
ui[3]: "A[3]"
ui[4]: "A[4]"
ui[5]: "A[5]"
ui[6]: "A[6]"
ui[7]: "A[7]"

# MAC output (accumulator lower 8 bits)

uo[0]: "ACC[0]"
uo[1]: "ACC[1]"
uo[2]: "ACC[2]"
uo[3]: "ACC[3]"
uo[4]: "ACC[4]"
uo[5]: "ACC[5]"
uo[6]: "ACC[6]"
uo[7]: "ACC[7]"

# Input B (uio_in[7:0])

uio[0]: "B[0]"
uio[1]: "B[1]"
uio[2]: "B[2]"
uio[3]: "B[3]"
uio[4]: "B[4]"
uio[5]: "B[5]"
uio[6]: "B[6]"
uio[7]: "B[7]"

yaml_version: 6
