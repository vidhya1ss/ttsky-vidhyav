# Tiny Tapeout project information

project:
  title: "SMAC Unit - Serial Multiply Accumulate"
  author: "V. Vidhya"
  discord: ""
  description: >
    8-bit Serial Multiply-Accumulate (SMAC) unit. The design multiplies
    two 8-bit input operands and accumulates the product on every clock
    cycle. The accumulated result is stored in an internal 16-bit register,
    and the lower 8 bits are provided at the output. The accumulator is
    cleared when reset is asserted.

  language: "Verilog"
  clock_hz: 10000000

  # One minimum tile is sufficient
  tiles: "1x1"

  # Top module name
  top_module: "tt_um_example"

  # Source files
  source_files:
    - "project.v"

pinout:
  # Dedicated inputs
  ui[0]: "A[0] - Multiplicand bit 0"
  ui[1]: "A[1] - Multiplicand bit 1"
  ui[2]: "A[2] - Multiplicand bit 2"
  ui[3]: "A[3] - Multiplicand bit 3"
  ui[4]: "A[4] - Multiplicand bit 4"
  ui[5]: "A[5] - Multiplicand bit 5"
  ui[6]: "A[6] - Multiplicand bit 6"
  ui[7]: "A[7] - Multiplicand bit 7"

  # Dedicated outputs
  uo[0]: "ACC[0] - Output bit 0"
  uo[1]: "ACC[1] - Output bit 1"
  uo[2]: "ACC[2] - Output bit 2"
  uo[3]: "ACC[3] - Output bit 3"
  uo[4]: "ACC[4] - Output bit 4"
  uo[5]: "ACC[5] - Output bit 5"
  uo[6]: "ACC[6] - Output bit 6"
  uo[7]: "ACC[7] - Output bit 7"

  # Bidirectional pins
  uio[0]: "B[0] - Multiplier bit 0"
  uio[1]: "B[1] - Multiplier bit 1"
  uio[2]: "B[2] - Multiplier bit 2"
  uio[3]: "B[3] - Multiplier bit 3"
  uio[4]: "B[4] - Multiplier bit 4"
  uio[5]: "B[5] - Multiplier bit 5"
  uio[6]: "B[6] - Multiplier bit 6"
  uio[7]: "B[7] - Multiplier bit 7"

yaml_version: 6
